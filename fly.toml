app = "diet-mcp"
primary_region = "nrt"

[build]

[env]
DIET_MCP_DB_PATH = "/data/diet-mcp.db"
DIET_MCP_ISSUER_URL = "https://diet-mcp.fly.dev"

[[mounts]]
source = "diet_mcp_data"
destination = "/data"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
